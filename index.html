<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Para Mamá ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ff4d6d;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

/* Pantalla inicial */
#inicio {
  display: block;
  padding: 20px;
}

/* Contenido oculto */
#contenido {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

/* Imagen */
img {
  width: 100%;
  max-width: 420px;
  border-radius: 15px;
  margin-bottom: 20px;
}

/* Texto */
.mensaje {
  font-size: 20px; /* 🔥 más grande */
  max-width: 90%;
  line-height: 1.6;
}

/* Título */
h1 {
  font-size: 32px; /* 🔥 grande en celular */
}

/* Botón */
button {
  padding: 16px 30px;
  font-size: 18px; /* 🔥 más grande */
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  margin-top: 15px;
}
</style>
</head>

<body>

<div id="inicio">
  <h1>Feliz Día de la Madre ❤️</h1>
  <button onclick="mostrar()">Ver sorpresa</button>
</div>

<div id="contenido">
  <img src="Felizdiadelamadre2.jpg" alt="Foto especial" />

  <div class="mensaje">
    Mamá, mira esto con calma… hay algo muy especial aquí.  
    Todo lo que viene tiene mucho de lo que tú me enseñaste ❤️
  </div>
</div>

<audio id="music">
  <source src="cancion.mp3" type="audio/mpeg" />
</audio>

<script>
function mostrar() {
  document.getElementById("inicio").style.display = "none";
  document.getElementById("contenido").style.display = "flex";
  document.getElementById("music").play();
}
</script>

</body>
</html>
